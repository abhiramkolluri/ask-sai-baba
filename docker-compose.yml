services:
  mongodb:
    image: mongo:6.0
    container_name: ask-sai-baba-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=ask-sai-baba
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - ask-sai-baba-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ask-sai-baba-backend
    ports:
      - "8000:8000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - FLASK_RUN_PORT=8000
      - FLASK_RUN_HOST=0.0.0.0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEAVIATE_URL=${WEAVIATE_URL}
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY}
    env_file:
      - backend/.env
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ask-sai-baba-network

networks:
  ask-sai-baba-network:
    driver: bridge

volumes:
  mongodb_data: 