services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ask-sai-baba-backend
    ports:
      - "8000:8000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - FLASK_RUN_PORT=8000
      - FLASK_RUN_HOST=0.0.0.0
      - MONGO_URI=${MONGO_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ask-sai-baba-network

networks:
  ask-sai-baba-network:
    driver: bridge 